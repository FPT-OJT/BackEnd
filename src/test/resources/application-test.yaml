server:
  port: 0
  address: 0.0.0.0
  servlet:
    context-path: ""

logging:
  level:
    root: INFO
    com:
      fpt:
        ojt: DEBUG
    org:
      hibernate:
        SQL: DEBUG
        orm:
          jdbc: OFF
      springframework:
        web: WARN
      flywaydb: DEBUG

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.cache.CacheAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        show_sql: false
        format_sql: true
    open-in-view: false

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379
      password: test
      database: 0

  cache:
    type: none

  mail:
    host: smtp.gmail.com
    port: 587
    username: test@test.com
    password: test

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret

app:
  secret: test-secret-key-for-testing-purposes-only
  default-locale: en_US
  default-timezone: UTC
  jwt:
    secret: test-jwt-secret-key-for-testing-purposes-only-must-be-at-least-256-bits
    token:
      expires-in: 3600000
    refresh-token:
      expires-in: 86400000
      expires-in-with-rememberme: 2592000000
  otp:
    expiration-minutes: 5

springdoc:
  api-docs:
    path: /v3/api-docs

scalar:
  path: /docs
  url: /v3/api-docs
  enabled: true
