name: Core-Service CD Flow

on:
  workflow_run:
    workflows: ["Core-Service CI Flow"]
    types:
      - completed
    branches:
      - main
      - main-v2

jobs:
  deploy-to-production:
    name: Deploy to Production Server
    runs-on: self-hosted

    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy Locally on Self-Hosted
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -e
          PROD_DIR="/opt/GitOps-Manifest"
          cd /Users/hork/Downloads/GitOps-Manifest/
          IMAGE_TAG=$IMAGE_TAG gmake up-core-service
